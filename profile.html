<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="logo">Блог</a>
    <a href="index.html" class="toplink">Общая лента</a>
</header>
  
  <div class="page profile-page">
    <aside class="sidebar" id="profileSidebar"></aside>

    <main class="content">
      <section id="profileHeader"></section>
      <hr>
      <h2>Посты</h2>
      <button id="showPostForm" class="new-post-button">+ Новый пост</button>

      <form id="postForm" class="post-form hidden">
        <textarea id="postText" placeholder="Текст поста"></textarea>
        <input id="postImage" type="text" placeholder="Ссылка на фото или путь images/posts/photo.jpg">
        <input id="postTags" type="text" placeholder="Теги через запятую: дождь, утро, кот">
        <input id="postMusicTitle" type="text" placeholder="Название музыки">
        <input id="postMusicFile" type="text" placeholder="Путь к музыке music/song.mp3">
        <button type="submit">Опубликовать</button>
      </form>

<div id="profilePosts"></div>
    </main>

  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
