<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Вход в блог</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <a href="feed.html" class="logo">Блог</a>
  <a href="feed.html" class="toplink">Общая лента</a>
  <a href="news.html" class="toplink">Новости</a>
</header>

<div class="auth-page">

  <section class="auth-card">
    <h1>Вход в блог</h1>

    <div id="loggedOutBlock">

      <div class="auth-tabs">
        <button
          id="showLoginButton"
          class="auth-tab active"
          type="button"
        >
          Вход
        </button>

        <button
          id="showRegisterButton"
          class="auth-tab"
          type="button"
        >
          Регистрация
        </button>
      </div>

      <form id="loginForm" class="auth-form">
        <label for="loginEmail">Почта</label>

        <input
          id="loginEmail"
          type="email"
          autocomplete="email"
          required
        >

        <label for="loginPassword">Пароль</label>

        <input
          id="loginPassword"
          type="password"
          autocomplete="current-password"
          minlength="6"
          required
        >

        <button type="submit">
          Войти
        </button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <label for="registerName">Имя</label>

        <input
          id="registerName"
          type="text"
          autocomplete="nickname"
          required
        >

        <label for="registerEmail">Почта</label>

        <input
          id="registerEmail"
          type="email"
          autocomplete="email"
          required
        >

        <label for="registerPassword">Пароль</label>

        <input
          id="registerPassword"
          type="password"
          autocomplete="new-password"
          minlength="6"
          required
        >

        <button type="submit">
          Зарегистрироваться
        </button>
      </form>
    </div>

    <div id="loggedInBlock" class="hidden">
      <p>Ты вошла как:</p>

      <strong id="currentUserEmail"></strong>

      <div id="ownedCharacters" class="owned-characters"></div>

      <button id="logoutButton" type="button">
        Выйти
      </button>
    </div>

    <div
      id="authMessage"
      class="auth-message"
      aria-live="polite"
    ></div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>

</body>
</html>
