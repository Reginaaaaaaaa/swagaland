<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Вход в блог</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <a href="feed.html" class="logo">Блог</a>
  <a href="feed.html" class="toplink">Общая лента</a>
  <a href="news.html" class="toplink">Новости</a>
</header>

<div class="auth-page">
  <section class="auth-card">
    <h1>Вход в аккаунт персонажа</h1>

    <div id="loggedOutBlock">
      <form id="loginForm" class="auth-form">

        <label for="loginName">
          Логин
        </label>

        <input
          id="loginName"
          type="text"
          autocomplete="username"
          placeholder="Например: Felix"
          required
        >

        <label for="loginPassword">
          Пароль
        </label>

        <input
          id="loginPassword"
          type="password"
          autocomplete="current-password"
          required
        >

        <button type="submit">
          Войти
        </button>
      </form>
    </div>

    <div id="loggedInBlock" class="hidden">
      <p>Выполнен вход в аккаунт:</p>

      <div id="ownedCharacters"></div>

      <button id="logoutButton" type="button">
        Выйти
      </button>
    </div>

    <div
      id="authMessage"
      class="auth-message"
      aria-live="polite"
    ></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>

</body>
</html>
